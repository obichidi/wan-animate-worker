name: build-and-push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # CUDA 12.4 devel base + torch cu124 + the diffusers/onnxruntime-gpu stack
      # makes a very large image; hosted runners need their bloat cleared first
      # (same trick as ardy-worker / gaussiangpt-worker).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache /opt/ghc \
                      /usr/share/swift /usr/local/.ghcup /usr/local/share/boost \
                      /usr/local/lib/node_modules /opt/microsoft /usr/share/miniconda \
                      /usr/lib/jvm /usr/lib/firefox /opt/az /usr/share/az_* \
                      /usr/lib/google-cloud-sdk /usr/local/share/powershell
          sudo docker system prune -af
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ochidi1/wan-animate:b${{ github.run_number }}
            ochidi1/wan-animate:latest
